services:
  # -------- INFRA --------
  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

  libretranslate:
    image: libretranslate/libretranslate:latest
    ports:
      - "5000:5000"
    restart: unless-stopped

  # -------- BACKEND --------
  backend:
    build: ./server
    container_name: backend
    command: pnpm dev
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      - REDIS_HOST=valkey
      - QDRANT_URL=http://qdrant:6333
      - LIBRETRANSLATE_URL=http://libretranslate:5000
    depends_on:
      - valkey
      - qdrant
      - libretranslate

  # -------- WORKER --------
  worker:
    build: ./server
    container_name: worker
    command: pnpm dev:worker
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      - REDIS_HOST=valkey
      - QDRANT_URL=http://qdrant:6333
      - LIBRETRANSLATE_URL=http://libretranslate:5000
    depends_on:
      - qdrant
      - valkey

  # -------- FRONTEND --------
  client:
    build: ./client
    container_name: client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

  # -------- RSS SERVICE --------
  rss-service:
    build: ./rss-service
    container_name: rss-service
    command: npm start
    volumes:
      - ./rss-service:/app
      - /app/node_modules
    env_file:
      - ./rss-service/.env
    restart: unless-stopped
