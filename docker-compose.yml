services:
  # -------- INFRA --------
  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"

  # -------- BACKEND --------
  backend:
    build: ./backend
    container_name: backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=valkey
      - QDRANT_URL=http://qdrant:6333
      - RATE_LIMIT_STORAGE=redis
    depends_on:
      - valkey
      - qdrant

  # -------- WORKER --------
  worker:
    build: ./backend
    container_name: worker
    command: arq worker.worker.WorkerSettings
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=valkey
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
      - valkey

  # -------- FRONTEND --------
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_uploads:
